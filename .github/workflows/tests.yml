name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal test dependencies
        # Only what the pure-logic tests need — no app server, no network deps.
        run: python -m pip install --upgrade pip pytest pytest-cov pytest-asyncio pydantic httpx

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v \
            --cov=groundcheck_engine.verdict \
            --cov=groundcheck_engine.models \
            --cov=groundcheck_engine.config \
            --cov=groundcheck_engine.retrieval \
            --cov=groundcheck_engine.stance \
            --cov=free_llm_router.ratelimit \
            --cov=free_llm_router.health \
            --cov=free_llm_router.providers \
            --cov-report=term-missing

      - name: Coverage summary
        run: |
          python -m coverage report | tail -1
          echo "Coverage of the tested pure-logic core is reported above."
